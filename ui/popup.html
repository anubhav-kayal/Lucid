<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucid</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #1a1a2e;
    }
    .header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: #e0e0e0; }
    .badge.local { background: #4caf50; color: #fff; }
    .badge.cloud { background: #ff9800; color: #fff; }
    button {
      width: 100%; padding: 10px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      background: #1a1a2e; color: #fff; transition: opacity .2s;
    }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .status { margin-top: 12px; font-size: 12px; color: #666; text-align: center; }
    .privacy-indicator { margin-top: 12px; font-size: 11px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Lucid</h1>
    <span class="badge local" id="mode-badge">On-device</span>
  </div>
  <button id="toggle-reader">Open Reader View</button>
  <div class="status" id="status-message">Ready</div>
  <div class="privacy-indicator" id="privacy-note">Processing stays on your device</div>
  <script src="popup.js"></script>
</body>
</html>
